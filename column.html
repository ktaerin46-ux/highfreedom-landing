<script>
// ══════════════════════════════════════════════════════════
//  ⚙️  설정 — 아래 값을 본인 정보로 교체하세요
// ══════════════════════════════════════════════════════════

const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

// 관리자 구글 이메일 (Google 로그인 시 글쓰기 권한 부여)
const ADMIN_EMAIL = "your_email@gmail.com";

// 카카오 JavaScript 앱 키 (Kakao Developers에서 확인)
const KAKAO_JS_KEY = "YOUR_KAKAO_JAVASCRIPT_KEY";

// 카카오 관리자 ID (카카오 로그인 후 콘솔에서 확인 가능)
const ADMIN_KAKAO_ID = "YOUR_KAKAO_USER_ID";

// ══════════════════════════════════════════════════════════

// Firebase 초기화
let db, auth;
try {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db   = firebase.firestore();
} catch(e) { console.warn('Firebase 초기화 실패:', e.message); }

// Kakao 초기화
try { Kakao.init(KAKAO_JS_KEY); } catch(e) { console.warn('Kakao SDK 초기화 실패:', e.message); }

// ── 상태 ──────────────────────────────────
let currentUser  = null;  // { type, name, email, isAdmin }
let articles     = [];
let activeCategory = '전체';
let editingId    = null;

// ── Firebase Auth 감지 ────────────────────
if (auth) {
  auth.onAuthStateChanged(user => {
    if (user) {
      const isAdmin = user.email === ADMIN_EMAIL;
      currentUser = { type: 'google', uid: user.uid, name: user.displayName || user.email, email: user.email, isAdmin };
    } else {
      // 카카오 세션 확인
      const kUser = safeGet('hf_kakao_user');
      currentUser = kUser || null;
    }
    updateAuthUI();
    renderList();
  });
} else {
  const kUser = safeGet('hf_kakao_user');
  currentUser = kUser || null;
  updateAuthUI();
}

// ── 인증 UI ──────────────────────────────
function updateAuthUI() {
  const area = document.getElementById('auth-area');
  const btnWrite = document.getElementById('btn-write');

  if (currentUser) {
    const initial = (currentUser.name || '유저').charAt(0);
    area.innerHTML = `
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-black text-white shrink-0"
             style="background:linear-gradient(135deg,#2563EB,#38BDF8);">${initial}</div>
        <span class="text-sm text-blue-100/70 hidden sm:block max-w-[120px] truncate">${currentUser.name}</span>
        <button onclick="logout()" class="text-xs text-brand-muted border border-brand-border px-2.5 py-1.5 rounded-lg hover:text-white hover:border-blue-500 transition-colors font-semibold">로그아웃</button>
      </div>`;
    if (currentUser.isAdmin) btnWrite.classList.remove('hidden');
    else btnWrite.classList.add('hidden');
  } else {
    area.innerHTML = `<button onclick="openLoginModal()" class="btn-primary text-xs sm:text-sm font-bold px-4 py-2 rounded-full">로그인</button>`;
    btnWrite.classList.add('hidden');
  }
}

// ── 로그인 ───────────────────────────────
async function loginGoogle() {
  if (!auth) return alert('Firebase 설정을 먼저 완료해주세요. (FIREBASE_CONFIG)');
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    closeLoginModal();
  } catch(e) { alert('Google 로그인 실패: ' + e.message); }
}

function loginKakao() {
  try {
    Kakao.Auth.login({
      success(authObj) {
        Kakao.API.request({
          url: '/v2/user/me',
          success(res) {
            const isAdmin = String(res.id) === String(ADMIN_KAKAO_ID);
            const user = {
              type: 'kakao',
              id: String(res.id),
              name: res.kakao_account?.profile?.nickname || '카카오유저',
              isAdmin
            };
            localStorage.setItem('hf_kakao_user', JSON.stringify(user));
            currentUser = user;
            updateAuthUI();
            renderList();
            closeLoginModal();
          },
          fail(err) { alert('카카오 정보 오류: ' + JSON.stringify(err)); }
        });
      },
      fail(err) { alert('카카오 로그인 실패: ' + JSON.stringify(err)); }
    });
  } catch(e) { alert('Kakao SDK 오류: ' + e.message + '\nKAKAO_JS_KEY를 확인해주세요.'); }
}

async function logout() {
  localStorage.removeItem('hf_kakao_user');
  if (auth?.currentUser) await auth.signOut();
  currentUser = null;
  updateAuthUI();
  renderList();
}

// ── Firestore ─────────────────────────────
async function loadArticles() {
  if (!db) {
    showEmptyState('Firebase 설정이 필요합니다. column.html의 FIREBASE_CONFIG를 입력해주세요.');
    return;
  }
  try {
    const snap = await db.collection('columns').orderBy('createdAt', 'desc').get();
    articles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderList();
  } catch(e) {
    showEmptyState('글을 불러오지 못했습니다. Firebase 설정 및 Firestore 보안 규칙을 확인해주세요.');
  }
}

function renderList() {
  const q     = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  const list  = articles.filter(a => {
    const catOk    = activeCategory === '전체' || a.category === activeCategory;
    const searchOk = !q || (a.title||'').toLowerCase().includes(q) || (a.content||'').toLowerCase().includes(q);
    return catOk && searchOk;
  });

  const el = document.getElementById('article-list');
  if (!el) return;

  if (list.length === 0) {
    el.innerHTML = `
      <div class="text-center py-20 text-brand-muted">
        <div class="text-4xl mb-4 opacity-30">📭</div>
        <p class="text-sm">${q ? '검색 결과가 없습니다.' : '아직 작성된 칼럼이 없습니다.'}</p>
      </div>`;
    return;
  }

  el.innerHTML = list.map(a => {
    const date    = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }) : '';
    const preview = (a.content || '').replace(/\n/g,' ').slice(0, 120);
    const adminBtns = currentUser?.isAdmin ? `
      <div class="flex gap-1.5 shrink-0">
        <button onclick="event.stopPropagation(); openEdit('${a.id}')" class="text-xs px-2.5 py-1 rounded-lg border border-brand-border text-brand-muted hover:text-white hover:border-blue-500 transition-colors">수정</button>
        <button onclick="event.stopPropagation(); deleteArticle('${a.id}')" class="text-xs px-2.5 py-1 rounded-lg text-red-400/60 border border-red-900/30 hover:text-red-400 hover:border-red-500/50 transition-colors">삭제</button>
      </div>` : '';
    return `
      <div class="glow-card rounded-2xl p-6 cursor-pointer" onclick="openDetail('${a.id}')">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-xs font-bold px-2.5 py-0.5 rounded-full" style="background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);color:#60A5FA;">${a.category || ''}</span>
              <span class="text-xs text-brand-muted">${date}</span>
            </div>
            <h3 class="font-black text-white text-lg mb-1.5 leading-snug">${escHtml(a.title || '제목 없음')}</h3>
            <p class="text-brand-muted text-sm leading-relaxed line-clamp-2">${escHtml(preview)}${preview.length >= 120 ? '...' : ''}</p>
          </div>
          ${adminBtns}
        </div>
      </div>`;
  }).join('');
}

function showEmptyState(msg) {
  const el = document.getElementById('article-list');
  if (el) el.innerHTML = `<div class="text-center py-20 text-brand-muted"><div class="text-4xl mb-4 opacity-30">⚙️</div><p class="text-sm">${msg}</p></div>`;
}

function setCategory(btn, cat) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── 상세 보기 ─────────────────────────────
function openDetail(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  const date = a.createdAt?.toDate ? a.createdAt.toDate().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }) : '';
  document.getElementById('detail-body').innerHTML = `
    <span class="text-xs font-bold px-2.5 py-1 rounded-full" style="background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);color:#60A5FA;">${a.category || ''}</span>
    <h1 class="text-3xl sm:text-4xl font-black text-white mt-5 mb-3 leading-snug">${escHtml(a.title || '')}</h1>
    <p class="text-brand-muted text-sm mb-10">${date} · HighFreedom</p>
    <div class="divider mb-10"></div>
    <div class="text-blue-100/80 text-base article-content">${escHtml(a.content || '')}</div>
    ${currentUser?.isAdmin ? `
      <div class="flex gap-3 mt-12 pt-8 border-t border-brand-border">
        <button onclick="closeDetail(); openEdit('${a.id}')" class="text-sm px-5 py-2.5 rounded-xl border border-brand-border text-brand-muted hover:text-white hover:border-blue-500 transition-colors font-bold">수정</button>
        <button onclick="if(confirm('삭제하시겠습니까?')){closeDetail();deleteArticle('${a.id}');}" class="text-sm px-5 py-2.5 rounded-xl border border-red-900/30 text-red-400/70 hover:text-red-400 hover:border-red-500/50 transition-colors font-bold">삭제</button>
      </div>` : ''}
  `;
  openOverlay('page-detail');
}

function closeDetail() { closeOverlay('page-detail'); }

// ── 글쓰기/수정 ───────────────────────────
function openWrite() {
  if (!currentUser?.isAdmin) return openLoginModal();
  editingId = null;
  document.getElementById('write-heading').textContent = '새 칼럼 작성';
  document.getElementById('inp-title').value   = '';
  document.getElementById('inp-content').value = '';
  document.getElementById('inp-cat').value     = '유튜브전략';
  openOverlay('page-write');
}

function openEdit(id) {
  if (!currentUser?.isAdmin) return;
  const a = articles.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('write-heading').textContent = '칼럼 수정';
  document.getElementById('inp-title').value   = a.title   || '';
  document.getElementById('inp-content').value = a.content || '';
  document.getElementById('inp-cat').value     = a.category || '유튜브전략';
  openOverlay('page-write');
}

function closeWrite() { closeOverlay('page-write'); }

async function submitArticle() {
  if (!currentUser?.isAdmin) return alert('권한이 없습니다.');
  if (!db) return alert('Firebase 설정을 확인해주세요.');

  const title    = document.getElementById('inp-title').value.trim();
  const content  = document.getElementById('inp-content').value.trim();
  const category = document.getElementById('inp-cat').value;
  if (!title)   return alert('제목을 입력해주세요.');
  if (!content) return alert('내용을 입력해주세요.');

  const data = {
    title, content, category,
    author:    currentUser.name || currentUser.email || 'HighFreedom',
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    if (editingId) {
      await db.collection('columns').doc(editingId).update(data);
    } else {
      await db.collection('columns').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
    closeWrite();
    await loadArticles();
  } catch(e) {
    if (e.code === 'permission-denied') {
      alert('저장 권한이 없습니다.\n\nFirebase Console → Firestore → 규칙 탭에서 아래 규칙을 설정해주세요:\n\nallow write: if request.auth != null && request.auth.token.email == "' + ADMIN_EMAIL + '";');
    } else {
      alert('저장 실패: ' + e.message);
    }
  }
}

async function deleteArticle(id) {
  if (!currentUser?.isAdmin) return;
  if (!confirm('정말 삭제하시겠습니까?')) return;
  try {
    await db.collection('columns').doc(id).delete();
    await loadArticles();
  } catch(e) { alert('삭제 실패: ' + e.message); }
}

// ── 로그인 모달 ───────────────────────────
function openLoginModal() {
  document.getElementById('modal-login').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLoginModal() {
  document.getElementById('modal-login').classList.remove('open');
  document.body.style.overflow = '';
}
function handleBackdropClick(e) {
  if (e.target === document.getElementById('modal-login')) closeLoginModal();
}

// ── 오버레이 헬퍼 ────────────────────────
function openOverlay(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
  window.scrollTo(0,0);
}
function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ESC 키로 닫기
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  closeOverlay('page-detail');
  closeOverlay('page-write');
  closeLoginModal();
});

// ── 유틸 ─────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function safeGet(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
}

// ── 초기 로드 ─────────────────────────────
loadArticles();
</script>

</body>
</html>
